<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shoot & Bang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* ===== TOKENS ===== */
  :root {
    --bg: #0a0a0f;
    --green: #00ff88;
    --violet: #7b2fff;
    --pink: #ff2d6b;
    --white: #e8e8e0;
    --dim: rgba(232,232,224,0.45);
    --glass: rgba(10,10,15,0.75);
    --glow-g: 0 0 18px #00ff8866, 0 0 40px #00ff8822;
    --glow-v: 0 0 18px #7b2fff88, 0 0 40px #7b2fff33;
    --r: 12px;
  }

  /* ===== RESET ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  
  body { 
    font-family: 'Press Start 2P', monospace; 
    color: var(--white); 
    touch-action: manipulation;
    font-size: 11px;
    line-height: 1.6;
  }

  /* ===== CAMERA LAYER ===== */
  #camera-bg { position: fixed; inset: 0; z-index: 0; background: #0a0a0f; }
  #camera-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; display: none; }
  #camera-bg::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
    pointer-events: none; z-index: 1;
  }

  /* ===== SCREEN LAYER ===== */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px;
    transition: opacity 0.35s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; display: none !important; }

  /* ===== START SCREEN ===== */
  #screen-start { gap: 0; }

  .logo-badge {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-bottom: 32px; width: 100%; max-width: 340px;
  }
  .badge-snafu { height: 54px; object-fit: contain; filter: drop-shadow(var(--glow-v)); }
  .badge-x { font-size: 16px; color: var(--dim); }
  .badge-wacca { height: 32px; object-fit: contain; filter: invert(1) drop-shadow(var(--glow-g)); }

  .edition-tag {
    font-size: 8px; color: var(--pink); letter-spacing: 2px;
    margin-bottom: 12px; text-shadow: 0 0 8px rgba(255,45,107,0.6);
    text-transform: uppercase;
  }

  .start-headline {
    font-size: clamp(18px, 5.5vw, 26px);
    white-space: nowrap;
    text-align: center; 
    margin-bottom: 40px;
    background: linear-gradient(to bottom, #ffffff 0%, #00d2ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(0,210,255,0.3);
  }

  .btn-primary {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    padding: 24px 64px; border-radius: var(--r);
    border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--green), #00cc6a);
    color: #0a0a0f;
    box-shadow: var(--glow-g), 0 0 30px rgba(0,255,136,0.4);
    transition: transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 1px;
  }
  .btn-primary:active { transform: scale(0.95); }
  .cam-notice { font-size: 7px; color: var(--dim); text-align: center; margin-top: 32px; line-height: 1.8; }

  /* ===== GAME SCREEN ===== */
  #screen-game { justify-content: flex-start; padding: 0; }
  #hud {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 48px 20px 16px; background: linear-gradient(to bottom, rgba(10,10,15,0.9), transparent);
    position: relative; z-index: 20;
  }
  .hud-score { font-size: 22px; color: var(--green); text-shadow: var(--glow-g); line-height: 1; margin-top: 4px; }
  .hud-label { font-size: 8px; color: var(--dim); text-transform: uppercase; }
  .hud-time-wrap { text-align: right; }
  .hud-time { font-size: 22px; line-height: 1; color: var(--white); transition: color 0.3s; margin-top: 4px; }
  .hud-time.urgent { color: var(--pink); text-shadow: 0 0 16px #ff2d6b88; }
  #progress-bar-wrap { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.08); }
  #progress-bar { height: 100%; background: linear-gradient(to right, var(--violet), var(--green)); transition: width 0.25s linear; width: 100%; }

  /* ===== TARGET ===== */
  #game-field { position: absolute; inset: 0; z-index: 15; pointer-events: none; }
  .target {
    position: absolute; width: 76px; height: 76px; transform: translate(-50%, -50%);
    pointer-events: all; -webkit-tap-highlight-color: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    animation: targetPop 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .target-inner {
    width: 100%; height: 100%; border-radius: 50%; border: 2.5px solid var(--green);
    background: rgba(10,10,15,0.85); box-shadow: 0 0 16px #00ff8844, inset 0 0 16px #00ff8818;
    display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 12px;
  }
  .target-inner img { width: 100%; height: 100%; object-fit: contain; }
  .target-inner::before {
    content: ''; position: absolute; inset: -8px; border-radius: 50%;
    border: 1.5px solid rgba(0,255,136,0.25); animation: ringPulse 1.2s ease-out infinite;
  }
  @keyframes targetPop {
    from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  @keyframes ringPulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.7); opacity: 0; } }
  .target.hit-vanish { animation: targetVanish 0.18s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; pointer-events: none; }
  @keyframes targetVanish { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } }

  /* ===== OVERLAYS & FEEDBACK ===== */
  #combo-overlay {
    position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0);
    font-size: 20px; color: var(--green); text-shadow: var(--glow-g); z-index: 80; pointer-events: none; opacity: 0;
  }
  .combo-animate { animation: comboPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  @keyframes comboPop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -40%) scale(0.9); opacity: 0; } }
  .feedback-pop { position: fixed; z-index: 100; font-size: 11px; pointer-events: none; animation: feedbackAnim 0.6s ease-out forwards; text-shadow: 0 0 12px currentColor; transform: translate(-50%, -50%); }
  .feedback-pop.hit { color: var(--green); } .feedback-pop.miss { color: var(--pink); }
  @keyframes feedbackAnim { 0% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%, calc(-50% - 48px)) scale(0.8); opacity: 0; } }
  .burst { position: fixed; z-index: 99; width: 80px; height: 80px; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%) scale(0); animation: burstAnim 0.4s ease-out forwards; }
  .burst.hit { background: radial-gradient(circle, rgba(0,255,136,0.45) 0%, transparent 70%); } .burst.miss { background: radial-gradient(circle, rgba(255,45,107,0.35) 0%, transparent 70%); }
  @keyframes burstAnim { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }

  /* ===== RESULT SCREEN ===== */
  #screen-result { gap: 14px; justify-content: flex-start; padding-top: 36px; overflow-y: auto; }
  .result-header { text-align: center; width: 100%; }
  .result-eyebrow { font-size: 9px; color: var(--pink); margin-bottom: 8px; }
  .result-score-big { font-size: 42px; color: var(--green); text-shadow: var(--glow-g); line-height: 1; }
  .result-score-label { font-size: 8px; color: var(--dim); margin-top: 8px; }
  .stats-row { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .stat-card {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--r); padding: 12px 16px;
  }
  .stat-val { font-size: 11px; } .stat-lbl { font-size: 8px; color: var(--dim); }
  .percentile-banner {
    width: 100%; background: linear-gradient(135deg, rgba(123,47,255,0.25), rgba(0,255,136,0.12));
    border: 1px solid rgba(123,47,255,0.5); border-radius: var(--r); padding: 14px; text-align: center;
  }
  .percentile-number { font-size: 14px; color: var(--green); text-shadow: var(--glow-g); }
  .percentile-text { font-size: 8px; color: var(--dim); margin-top: 6px; }

  /* フォーム入力周りの最適化 */
  .email-section {
    width: 100%; background: var(--glass); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: var(--r); padding: 16px;
  }
  .email-title { font-size: 10px; margin-bottom: 8px; color: var(--white); }
  .email-desc { font-size: 7px; color: var(--dim); margin-bottom: 12px; line-height: 1.6; }
  
  .form-input {
    width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.15); border-radius: 8px; color: var(--white); font-size: 9px;
    font-family: 'Press Start 2P', monospace; outline: none; margin-bottom: 10px;
  }
  .form-input:focus { border-color: var(--green); }

  .btn-submit-flow {
    width: 100%; font-family: 'Press Start 2P', monospace; font-size: 10px;
    padding: 14px; border-radius: 8px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--violet), #5a1fd6); color: var(--white);
    box-shadow: var(--glow-v); -webkit-tap-highlight-color: transparent;
  }
  .btn-skip {
    background: none; border: none; cursor: pointer; color: var(--dim); font-size: 8px;
    padding: 12px; width: 100%; text-align: center; font-family: 'Press Start 2P', monospace;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== RANKING BOARD SCREEN ===== */
  #screen-leaderboard { gap: 16px; justify-content: flex-start; padding-top: 36px; overflow-y: auto; }
  .board-title {
    font-size: 16px; text-align: center; margin-bottom: 12px;
    background: linear-gradient(to bottom, #ffea00, #ff9900);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .board-container {
    width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--r); padding: 14px; max-height: 280px; overflow-y: auto;
  }
  .board-container::-webkit-scrollbar { width: 4px; }
  .board-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .board-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 9px;
  }
  .board-row.top3 { color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.4); }
  .board-row:last-child { border-bottom: none; }
  
  /* インスタボタン */
  .sns-row { display: flex; gap: 12px; width: 100%; margin-top: 10px; }
  .btn-sns {
    flex: 1; padding: 18px 8px; border-radius: var(--r); cursor: pointer;
    border: 2px solid var(--violet); background: rgba(123,47,255,0.15);
    box-shadow: var(--glow-v);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    -webkit-tap-highlight-color: transparent; text-decoration: none;
  }
  .btn-sns:active { background: var(--violet); }
  .btn-sns img { height: 32px; object-fit: contain; }
  .sns-lbl { font-size: 8px; color: #fff; font-weight: bold; text-shadow: 0 0 6px rgba(255,255,255,0.5); }

  .btn-retry {
    background: none; border: 1.5px solid rgba(255,255,255,0.15);
    color: var(--dim); font-size: 9px; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%;
    font-family: 'Press Start 2P', monospace; -webkit-tap-highlight-color: transparent; margin-top: 8px;
  }
  .btn-retry:active { border-color: var(--green); color: var(--green); }

  #sending-overlay {
    position: fixed; inset: 0; z-index: 200; background: rgba(10,10,15,0.85); backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #sending-overlay.show { opacity: 1; pointer-events: all; }
  .spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(0,255,136,0.15); border-top-color: var(--green); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sending-text { font-size: 9px; color: var(--dim); }
  #cam-denied { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 50; font-size: 8px; color: var(--dim); background: var(--glass); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-radius: 8px; padding: 8px 14px; white-space: nowrap; display: none; }
</style>
</head>
<body>

<div id="camera-bg">
  <video id="camera-video" autoplay muted playsinline></video>
</div>

<div class="screen" id="screen-start">
  <div class="logo-badge">
    <img src="snafu_logo.png" class="badge-snafu" alt="SNAFU">
    <span class="badge-x">×</span>
    <img src="wacca_logo.png" class="badge-wacca" alt="wacca">
  </div>

  <div class="edition-tag">POP UP EDITION</div>
  <h1 class="start-headline">Shoot & Bang</h1>
  <p class="start-sub">LIMIT: 10 SECONDS</p>

  <button class="btn-primary" id="btn-start">PLAY</button>

  <p class="cam-notice">CAMERA ACCESS REQUIRED<br>FOR THE GAMEPLAY</p>
</div>

<div class="screen hidden" id="screen-game">
  <div id="hud">
    <div>
      <div class="hud-label">SCORE</div>
      <div class="hud-score" id="hud-score">0</div>
    </div>
    <div class="hud-time-wrap">
      <div class="hud-label">TIME</div>
      <div class="hud-time" id="hud-time">10</div>
    </div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>
  <div id="game-field"></div>
</div>

<div id="combo-overlay"></div>

<div class="screen hidden" id="screen-result">
  <div class="result-header">
    <div class="result-eyebrow">GAME OVER</div>
    <div class="result-score-big" id="res-score">0</div>
    <div class="result-score-label">TOTAL SCORE</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-lbl" style="color:var(--green)">HIT</div>
      <div class="stat-val" id="res-hits">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl" style="color:var(--pink)">MISS</div>
      <div class="stat-val" id="res-miss">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">ACCURACY</div>
      <div class="stat-val" id="res-acc">0%</div>
    </div>
  </div>

  <div class="percentile-banner">
    <div class="percentile-number" id="res-percentile">—</div>
    <div class="percentile-text" id="res-percentile-text">ANALYZING RECORD...</div>
  </div>

  <div class="email-section">
    <div class="email-title">🎁 ENTER YOUR PROFILE</div>
    
    <input type="text" class="form-input" id="nickname-input" placeholder="YOUR NAME (MAX 8)" maxlength="8">
    <input type="email" class="form-input" id="email-input" placeholder="your@email.com (OPTIONAL)" inputmode="email">
    
    <button class="btn-submit-flow" id="btn-submit-flow">SUBMIT & VIEW RANKING</button>
    <button class="btn-skip" id="btn-skip-flow">SKIP & VIEW RANKING →</button>
  </div>
</div>

<div class="screen hidden" id="screen-leaderboard">
  <h2 class="board-title">🏆 TOP 15 RECORDS</h2>
  
  <div class="board-container" id="leaderboard-list">
    <div style="text-align:center; padding:20px; font-size:8px; color:var(--dim);">LOADING...</div>
  </div>

  <div class="sns-row">
    <a class="btn-sns" id="link-snafu" href="#" target="_blank" rel="noopener">
      <img src="snafu_logo.png" alt="SNAFU">
      <span class="sns-lbl">SNAFU INSTA</span>
    </a>
    <a class="btn-sns" id="link-wacca" href="#" target="_blank" rel="noopener">
      <img src="wacca_logo.png" style="filter: invert(1);" alt="wacca">
      <span class="sns-lbl">WACCA INSTA</span>
    </a>
  </div>

  <button class="btn-retry" id="btn-retry">RETRY</button>
</div>

<div id="sending-overlay">
  <div class="spinner"></div>
  <div class="sending-text">TRACKING DATA…</div>
</div>

<div id="cam-denied">📵 NO CAMERA MODE</div>

<script>
// =============================================
//  CONFIG — システム設定
// =============================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzGKQuK1k6cdDtbFn9kxGaGeRE-DGY3Ow4dxDqWXoT2z7Z2izB7dti4RWHrwoG7Xq6k/exec";
const SNAFU_IG = "https://www.instagram.com/snafuvintage?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==";
const WACCA_IG  = "https://www.instagram.com/wacca__jp?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==";

const GAME_DURATION = 10; 
const TARGET_IMAGES = ["snafu_logo.png", "wacca_logo.png"];
const TARGET_INTERVAL_MIN = 533;   
const TARGET_INTERVAL_MAX = 1066;  
const TARGET_LIFETIME     = 1500;  
// =============================================

/* ---- STATE ---- */
const state = {
  sessionId: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
  eventType: new URLSearchParams(location.search).get("env") || "popup",
  playCount: 0,
  loadTimeMs: 0,
  cameraPermission: "unknown",
  score: 0,
  hits: 0,
  misses: 0,
  combo: 0,
  playDuration: 0,
  snsClickWacca: false,
  snsClickSnafu: false,
  submitted: false,
  timeLeft: GAME_DURATION,
  gameActive: false,
  timerInterval: null,
  spawnTimeout: null,
  startTs: 0,
  pageLoadTs: performance.now(),
};

/* ---- INIT ---- */
const playCount = parseInt(localStorage.getItem("snafu_play_count") || "0");
state.playCount = playCount + 1;
localStorage.setItem("snafu_play_count", String(state.playCount));

document.getElementById("link-snafu").href = SNAFU_IG;
document.getElementById("link-wacca").href = WACCA_IG;

/* ---- CAMERA ---- */
async function startCamera() {
  const video = document.getElementById("camera-video");
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    video.style.display = "block";
    state.cameraPermission = "granted";
  } catch {
    state.cameraPermission = "denied";
    document.getElementById("cam-denied").style.display = "block";
    setTimeout(() => { document.getElementById("cam-denied").style.display = "none"; }, 3000);
  }
}

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* ---- START ---- */
document.getElementById("btn-start").addEventListener("click", async () => {
  state.loadTimeMs = Math.round(performance.now() - state.pageLoadTs);
  await startCamera();
  resetGame();
  show("screen-game");
  startGame();
});

/* ---- GAME ---- */
function resetGame() {
  state.score = 0; state.hits = 0; state.misses = 0; state.combo = 0;
  state.timeLeft = GAME_DURATION; state.gameActive = false;
  state.snsClickWacca = false; state.snsClickSnafu = false;
  state.submitted = false;
  document.getElementById("hud-score").textContent = "0";
  document.getElementById("hud-time").textContent  = String(GAME_DURATION);
  document.getElementById("hud-time").classList.remove("urgent");
  document.getElementById("progress-bar").style.width = "100%";
  document.getElementById("game-field").innerHTML = "";
  document.getElementById("nickname-input").value = "";
  document.getElementById("email-input").value = "";
  document.getElementById("res-percentile").textContent = "—";
  document.getElementById("res-percentile-text").textContent = "ANALYZING RECORD...";
  
  const comboEl = document.getElementById("combo-overlay");
  comboEl.textContent = "";
  comboEl.classList.remove("combo-animate");
}

function startGame() {
  state.gameActive = true;
  state.startTs = Date.now();

  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    const el = document.getElementById("hud-time");
    el.textContent = String(state.timeLeft);
    document.getElementById("progress-bar").style.width =
      ((state.timeLeft / GAME_DURATION) * 100) + "%";
    if (state.timeLeft <= 3) el.classList.add("urgent"); 
    if (state.timeLeft <= 0) endGame();
  }, 1000);

  spawnNext();
}

function spawnNext() {
  if (!state.gameActive) return;
  const delay = TARGET_INTERVAL_MIN + Math.random() * (TARGET_INTERVAL_MAX - TARGET_INTERVAL_MIN);
  state.spawnTimeout = setTimeout(() => {
    spawnTarget();
    spawnNext();
  }, delay);
}

function spawnTarget() {
  const field  = document.getElementById("game-field");
  const margin = 56;
  const x = margin + Math.random() * (window.innerWidth  - margin * 2);
  const y = 140   + Math.random() * (window.innerHeight  - 240);
  
  const randomImg = TARGET_IMAGES[Math.floor(Math.random() * TARGET_IMAGES.length)];
  const t = document.createElement("div");
  t.className = "target";
  t.style.left = x + "px"; t.style.top = y + "px";
  
  const invertStyle = randomImg === "wacca_logo.png" ? "filter: invert(1);" : "";
  t.innerHTML = `<div class="target-inner"><img src="${randomImg}" style="${invertStyle}" alt="target"></div>`;

  let hit = false;
  t.addEventListener("click", (e) => {
    if (!state.gameActive) return;
    e.stopPropagation();
    hit = true;
    
    state.combo++;
    state.score += 10 + Math.floor(state.combo / 5) * 5;
    state.hits++;
    
    document.getElementById("hud-score").textContent = state.score;
    showFeedback(x, y, `+10`, "hit");
    
    if (state.combo >= 3) {
      const comboEl = document.getElementById("combo-overlay");
      comboEl.textContent = `${state.combo} COMBO!`;
      comboEl.classList.remove("combo-animate");
      void comboEl.offsetWidth; 
      comboEl.classList.add("combo-animate");
      
      if (state.combo % 10 === 0) {
        comboEl.style.color = "var(--pink)";
        comboEl.style.textShadow = "0 0 18px #ff2d6b88";
      } else {
        comboEl.style.color = "var(--green)";
        comboEl.style.textShadow = "var(--glow-g)";
      }
    }

    t.classList.add("hit-vanish");
    setTimeout(() => { if(t.parentNode) t.remove(); }, 180);
  });

  field.appendChild(t);
  setTimeout(() => { if (!hit && t.parentNode) { t.remove(); } }, TARGET_LIFETIME);
}

document.getElementById("screen-game").addEventListener("click", (e) => {
  if (!state.gameActive) return;
  if (e.target.closest(".target") || e.target.closest("#hud")) return;
  state.combo = 0;
  state.misses++;
  showFeedback(e.clientX, e.clientY, "MISS", "miss");
});

function showFeedback(x, y, text, type) {
  const fb = document.createElement("div");
  fb.className = `feedback-pop ${type}`; fb.textContent = text;
  fb.style.left = x + "px"; fb.style.top = y + "px";
  document.body.appendChild(fb);
  setTimeout(() => fb.remove(), 650);

  const burst = document.createElement("div");
  burst.className = `burst ${type}`;
  burst.style.left = x + "px"; burst.style.top = y + "px";
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 420);
}

function endGame() {
  state.gameActive = false;
  clearInterval(state.timerInterval);
  clearTimeout(state.spawnTimeout);
  document.getElementById("game-field").innerHTML = "";

  state.playDuration = Math.round((Date.now() - state.startTs) / 1000);
  const accuracy = state.hits + state.misses > 0 ? Math.round((state.hits / (state.hits + state.misses)) * 100) : 0;

  document.getElementById("res-score").textContent = state.score;
  document.getElementById("res-hits").textContent  = state.hits;
  document.getElementById("res-miss").textContent  = state.misses;
  document.getElementById("res-acc").textContent   = accuracy + "%";

  show("screen-result");
}

document.getElementById("link-snafu").addEventListener("click", () => { state.snsClickSnafu = true; });
document.getElementById("link-wacca").addEventListener("click", () => { state.snsClickWacca = true; });

/* ---- データ送信＆ランキングボード生成 ---- */
async function sendDataWithCors(email, name) {
  if (state.submitted) return;
  state.submitted = true;

  const accuracy = state.hits + state.misses > 0
    ? Math.round((state.hits / (state.hits + state.misses)) * 100) : 0;

  const payload = {
    session_id:       state.sessionId,
    event_type:       state.eventType,
    play_count:       state.playCount,
    load_time_ms:     state.loadTimeMs,
    camera_permission: state.cameraPermission,
    play_duration_sec: state.playDuration,
    total_score:      state.score,
    hit_taps:         state.hits,
    miss_taps:        state.misses,
    tap_accuracy:     accuracy,
    email:            email || "",
    nickname:         name || "ANON",
    sns_click_wacca:  state.snsClickWacca,
    sns_click_snafu:  state.snsClickSnafu,
  };

  document.getElementById("sending-overlay").classList.add("show");

  try {
    const res  = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload),
    });
    const json = await res.json();

    show("screen-leaderboard"); 

    if (json.success) {
      const pct = 100 - json.percentile;
      document.getElementById("res-percentile").textContent = `TOP ${pct}%`;
      document.getElementById("res-percentile-text").textContent = `FROM ${json.total_players} PLAYERS`;
      
      const listEl = document.getElementById("leaderboard-list");
      listEl.innerHTML = ""; 
      
      json.leaderboard.forEach((player, index) => {
        const rank = index + 1;
        const isTop3 = rank <= 3 ? "top3" : "";
        const crown = rank === 1 ? "👑 " : rank === 2 ? "🥈 " : rank === 3 ? "🥉 " : `${rank}. `;
        
        listEl.innerHTML += `
          <div class="board-row ${isTop3}">
            <span>${crown}${player.nickname}</span>
            <span>${player.score}P</span>
          </div>
        `;
      });
    } else {
      showLeaderboardFallback(name);
    }
  } catch (err) {
    console.error("送信エラー:", err);
    show("screen-leaderboard");
    showLeaderboardFallback(name);
  } finally {
    document.getElementById("sending-overlay").classList.remove("show");
  }
}

function showLeaderboardFallback(currentName) {
  const listEl = document.getElementById("leaderboard-list");
  listEl.innerHTML = `
    <div class="board-row top3">
      <span>👑 1. ${currentName} (YOU)</span>
      <span>${state.score}P</span>
    </div>
    <div style="text-align:center; padding:16px 0 6px; font-size:7px; color:var(--pink); letter-spacing:-0.5px;">
      *DATABASE IS TEMPORARILY OFFLINE
    </div>
  `;
}

/* ---- BUTTONS EVENTS ---- */

document.getElementById("btn-submit-flow").addEventListener("click", async () => {

  await sendDataWithCors("", "ANON");
});

document.getElementById("btn-retry").addEventListener("click", () => {
  resetGame();
  show("screen-game");
  startGame();
});
</script>
